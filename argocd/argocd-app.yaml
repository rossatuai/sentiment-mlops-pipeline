apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: sentiment-api
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/rossatuai/sentiment-mlops-pipeline.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true