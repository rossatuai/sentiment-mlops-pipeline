name: Model Artifact Storage

on:
  # Allows workflow to be started manually
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      # Gets latest files from repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Sets up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Installs required packages
      - name: Install Dependencies
        run: pip install -r requirements.txt

      # Runs data preprocessing
      - name: Run preprocessing
        run: python src/preprocess.py

      # Trains the machine learning model
      - name: Train Model
        run: python src/train.py

      # Saves trained model as an artifact
      - name: Upload Trained Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/sentiment_model.pkl

  verify-artifact:
    runs-on: ubuntu-latest
    needs: train   # Runs only after training job finishes

    steps:
      # Downloads saved model artifact
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model

      # Checks if model file exists
      - name: Verify file exists
        run: |
          if [ -f sentiment_model.pkl ]; then
            echo "Model artifact found"
          else
            echo "Model artifact missing"
            exit 1
          fi