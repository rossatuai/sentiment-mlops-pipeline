name: Unit Tests

on:
  push:
    branches:
      - main
      - develop
      - 'feature/*'

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt



    - name: Train Model
      run: python src/train.py

    - name: Run Pytest
      run: pytest