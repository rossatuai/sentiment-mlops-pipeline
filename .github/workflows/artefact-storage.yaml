name: Artifacts

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build project
        run: |
          mkdir dist
          echo "Artifact Demo for CA3" > dist/output.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: dist/

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: dist/

      - name: Use artifact
        run: cat dist/output.txt