name: DockerHub Push

on:
  workflow_run:
    workflows: ["MLOps Pipeline"]
    types:
      - completed

jobs:
  docker:

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.actor.login != 'github-actions'

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/sentiment-api:${{ github.run_number }} .

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/sentiment-api:${{ github.run_number }}

    - name: Update Kubernetes Manifest
      run: |
        sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/sentiment-api:${{ github.run_number }}|" k8s/deployment.yaml

    - name: Commit updated manifest
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"

        git add k8s/deployment.yaml

        git commit -m "Update image tag to ${{ github.run_number }}" || echo "No changes"

        git push